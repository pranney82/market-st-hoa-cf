name = "market-st-hoa"
main = "./dist/_worker.js/index.js"
compatibility_date = "2026-03-20"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = "./dist"

[vars]
BASE_URL = "https://marketstreethoa.com"

# D1 Database (replaces Neon + Hyperdrive — everything on CF now)
[[d1_databases]]
binding = "DB"
database_name = "market-st-hoa"
database_id = "1df37fc1-3f59-41ed-a5b0-eaf4b92c44ce" # Set after: wrangler d1 create market-st-hoa

# R2 Object Storage
[[r2_buckets]]
binding = "R2"
bucket_name = "marketst-hoa-files"

# KV (rate limiting, checkout state, push subscriptions)
[[kv_namespaces]]
binding = "SESSIONS"
id = "52c11eb22743403ca2b41668352b762b"

# Queues
[[queues.producers]]
queue = "hoa-email-queue"
binding = "EMAIL_QUEUE"

[[queues.producers]]
queue = "hoa-payment-queue"
binding = "PAYMENT_QUEUE"

[[queues.consumers]]
queue = "hoa-email-queue"
max_batch_size = 10
max_retries = 3

[[queues.consumers]]
queue = "hoa-payment-queue"
max_batch_size = 5
max_retries = 5
max_batch_timeout = 30

# Cron Triggers
[triggers]
crons = [
  "1 0 1 * *",
  "0 1 * * *",
  "0 9 15 * *",
]

[observability]
enabled = true
