name = "market-st-hoa"
main = "./dist/_worker.js/index.js"
compatibility_date = "2026-03-20"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = "./dist"

[vars]
BASE_URL = "https://marketstreethoa.com"

# D1 Database (replaces Neon + Hyperdrive — everything on CF now)
[[d1_databases]]
binding = "DB"
database_name = "market-st-hoa"
database_id = "71ac037d-2682-4336-9cf7-234e97c5b462" # Set after: wrangler d1 create market-st-hoa

# R2 Object Storage
[[r2_buckets]]
binding = "R2"
bucket_name = "marketst-hoa-files"

# KV (Sessions)
[[kv_namespaces]]
binding = "SESSIONS"
id = "52c11eb22743403ca2b41668352b762b"

# Cron Triggers
[triggers]
crons = [
  "1 0 1 * *",
  "0 1 * * *",
  "0 9 15 * *",
  "0 2 5 * *",
  "0 * * * *",
]

[observability]
enabled = true
